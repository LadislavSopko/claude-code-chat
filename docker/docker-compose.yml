services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: claude_chat
      POSTGRES_PASSWORD: claude_chat
      POSTGRES_DB: claude_chat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-ONLY", "pg_isready", "-U", "claude_chat"]
      interval: 5s
      timeout: 3s
      retries: 5

  broker:
    image: oven/bun:1-debian
    working_dir: /app
    volumes:
      - ../src/broker.ts:/app/src/broker.ts:ro
    command: bun run src/broker.ts
    ports:
      - "4000:4000"
    environment:
      PORT: 4000

volumes:
  pgdata:
