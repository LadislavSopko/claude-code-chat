services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: claude_chat
      POSTGRES_PASSWORD: claude_chat
      POSTGRES_DB: claude_chat
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "claude_chat"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "4444:4444"
    environment:
      PORT: 4444
      DEV_MODE: "true"
      DATABASE_URL: postgres://claude_chat:claude_chat@postgres:5432/claude_chat
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
