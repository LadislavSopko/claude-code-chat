<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="https://unpkg.com/ui-ticket-panel/dist/bundle.js"></script>
  <style>
    .msg .text * { margin: 0; padding: 0; }
    .msg .text p + p { margin-top: 2px; }
    .msg .text ul, .msg .text ol { margin-left: 8px; padding-left: 16px; line-height: 1.3; }
    .msg .text li { line-height: 1.3; }
    .msg .text code { background: #334155; padding: 1px 5px; border-radius: 3px; font-size: 13px; }
    .msg .text pre { background: #0f172a; border: 1px solid #475569; border-radius: 6px; padding: 6px 10px; overflow-x: auto; margin: 2px 0; }
    .msg .text pre code { background: none; padding: 0; font-size: 13px; }
    .msg .text blockquote { border-left: 3px solid #6366f1; padding-left: 10px; color: #94a3b8; margin: 2px 0; }
    .msg .text strong { color: #f1f5f9; }
    .msg .text h1, .msg .text h2, .msg .text h3, .msg .text h4 { font-size: 14px; color: #f1f5f9; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }

    .header { background: #1e293b; padding: 14px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #334155; }
    .header h1 { font-size: 20px; color: #818cf8; font-weight: 700; letter-spacing: -0.5px; }
    .status { font-size: 13px; color: #64748b; margin-left: auto; }
    .status.connected { color: #34d399; font-weight: 600; }

    .connect-form { background: #1e293b; padding: 10px 24px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid #334155; }
    .connect-form input, .connect-form select { background: #0f172a; border: 1px solid #475569; color: #e2e8f0; padding: 7px 10px; border-radius: 6px; font-size: 13px; outline: none; }
    .connect-form input:focus, .connect-form select:focus { border-color: #818cf8; }
    .connect-form input::placeholder { color: #64748b; }
    .connect-form select { cursor: pointer; min-width: 180px; }
    .connect-form select option { background: #0f172a; }
    .connect-form button { padding: 7px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
    #connect-btn { background: #059669; color: #fff; }
    #connect-btn:hover { background: #047857; }
    #new-room-btn { background: #6366f1; color: #fff; }
    #new-room-btn:hover { background: #4f46e5; }
    #disconnect-btn { background: #dc2626; color: #fff; display: none; }
    .room-name-tag { background: #6366f1; color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; display: none; }

    .messages { flex: 1; overflow-y: auto; padding: 10px 24px; display: flex; flex-direction: column; gap: 4px; }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

    .msg { padding: 6px 10px; border-radius: 10px; max-width: 75%; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
    .msg .meta { display: flex; align-items: baseline; gap: 6px; margin-bottom: 2px; }
    .msg .sender { font-weight: 700; font-size: 13px; }
    .msg .time { font-size: 11px; color: #64748b; }
    .msg .text { white-space: pre-wrap; }

    .msg.self { background: #1e3a5f; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.self .sender { color: #60a5fa; }
    .msg.other { background: #1e293b; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #334155; }
    .msg.other .sender { color: #a78bfa; }
    .msg.system { background: transparent; align-self: center; font-size: 12px; color: #64748b; padding: 4px 12px; border: 1px solid #334155; border-radius: 20px; }

    .msg.other[data-sender="researcher"] .sender { color: #34d399; }
    .msg.other[data-sender="claude"] .sender { color: #f472b6; }

    .input-bar { background: #1e293b; padding: 14px 24px; display: flex; gap: 10px; border-top: 1px solid #334155; }
    .input-bar input { flex: 1; background: #0f172a; border: 1px solid #475569; color: #e2e8f0; padding: 12px 16px; border-radius: 10px; font-size: 15px; outline: none; }
    .input-bar input:focus { border-color: #818cf8; }
    #send-btn { background: #6366f1; color: #fff; padding: 12px 24px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; font-size: 15px; }
    #send-btn:hover { background: #4f46e5; }
    #stop-btn { background: #dc2626; color: #fff; padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 800; font-size: 14px; letter-spacing: 0.5px; }
    #stop-btn:hover { background: #b91c1c; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Claude Code Chat</h1>
    <span class="room-name-tag" id="room-tag"></span>
    <span class="status" id="status">Disconnected</span>
  </div>
  <div class="connect-form" id="connect-form">
    <input id="api-key-input" placeholder="API Key" value="dev-api-key-change-me" style="width:170px" />
    <select id="room-select"><option value="">-- select room --</option></select>
    <input id="new-room-name" placeholder="or new room name..." style="width:150px" />
    <button id="new-room-btn">Create</button>
    <input id="name-input" placeholder="Your name" value="human" style="width:100px" />
    <button id="connect-btn">Connect</button>
    <button id="disconnect-btn">Disconnect</button>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-bar">
    <input id="message-input" placeholder="Type a message..." disabled />
    <button id="send-btn" disabled>Send</button>
    <button id="stop-btn" disabled>STOP ALL</button>
  </div>

  <script>
    var ws = null;
    var myName = '';
    var roomId = '';
    var roomName = '';
    var apiKey = '';

    var msgArea = document.getElementById('messages');
    var msgInput = document.getElementById('message-input');
    var sendBtn = document.getElementById('send-btn');
    var stopBtn = document.getElementById('stop-btn');
    var connectBtn = document.getElementById('connect-btn');
    var disconnectBtn = document.getElementById('disconnect-btn');
    var statusEl = document.getElementById('status');
    var roomSelect = document.getElementById('room-select');
    var newRoomName = document.getElementById('new-room-name');
    var newRoomBtn = document.getElementById('new-room-btn');
    var roomTag = document.getElementById('room-tag');

    function escapeHtml(str) {
      var d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function addMessage(text, sender, type, timestamp) {
      var div = document.createElement('div');
      var cls = type === 'system' ? 'system' : (sender === myName ? 'self' : 'other');
      div.className = 'msg ' + cls;
      if (sender && sender !== myName) div.setAttribute('data-sender', sender);
      var time = timestamp ? new Date(timestamp).toLocaleTimeString() : new Date().toLocaleTimeString();
      if (type === 'system') {
        div.textContent = text;
      } else {
        var meta = document.createElement('div');
        meta.className = 'meta';
        meta.innerHTML = '<span class="sender">' + escapeHtml(sender) + '</span><span class="time">' + time + '</span>';
        var body = document.createElement('div');
        body.className = 'text';
        var html = typeof marked !== 'undefined' ? marked.parse(text) : escapeHtml(text);
        body.innerHTML = html;
        body.querySelectorAll('li').forEach(function(li) {
          for (var i = li.childNodes.length - 1; i >= 0; i--) {
            if (li.childNodes[i].nodeType === 3 && !li.childNodes[i].textContent.trim()) li.removeChild(li.childNodes[i]);
          }
        });
        div.appendChild(meta);
        div.appendChild(body);
      }
      msgArea.appendChild(div);
      msgArea.scrollTop = msgArea.scrollHeight;
    }

    function saveSession() {
      localStorage.setItem('chat-session', JSON.stringify({ apiKey: apiKey, roomId: roomId, roomName: roomName, myName: myName }));
    }

    function loadSession() {
      try { return JSON.parse(localStorage.getItem('chat-session')); } catch(e) { return null; }
    }

    function clearSession() {
      localStorage.removeItem('chat-session');
    }

    function loadRooms() {
      var key = document.getElementById('api-key-input').value;
      if (!key) return;
      fetch('/api/chat/rooms', { headers: { 'Authorization': 'Bearer ' + key } })
        .then(function(r) { return r.json(); })
        .then(function(rooms) {
          roomSelect.innerHTML = '<option value="">-- select room --</option>';
          rooms.forEach(function(r) {
            var opt = document.createElement('option');
            opt.value = r.id;
            opt.textContent = r.name;
            opt.setAttribute('data-name', r.name);
            roomSelect.appendChild(opt);
          });
          var session = loadSession();
          if (session && session.roomId) {
            roomSelect.value = session.roomId;
          }
        });
    }

    newRoomBtn.onclick = function() {
      var name = newRoomName.value.trim();
      var key = document.getElementById('api-key-input').value;
      if (!name || !key) { alert('Room name and API Key required'); return; }
      fetch('/api/chat/rooms', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name })
      }).then(function(r) { return r.json(); }).then(function(room) {
        newRoomName.value = '';
        loadRooms();
        setTimeout(function() { roomSelect.value = room.id; }, 300);
      });
    };

    function doConnect() {
      apiKey = document.getElementById('api-key-input').value;
      roomId = roomSelect.value;
      roomName = roomSelect.options[roomSelect.selectedIndex] ? roomSelect.options[roomSelect.selectedIndex].textContent : '';
      myName = document.getElementById('name-input').value || 'human';

      if (!apiKey || !roomId) { alert('Select a room and enter API Key'); return; }

      saveSession();

      var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      var url = protocol + '//' + location.host + '/ws?apiKey=' + encodeURIComponent(apiKey) + '&name=' + encodeURIComponent(myName);
      ws = new WebSocket(url);

      ws.onopen = function() {
        statusEl.textContent = 'Connected as ' + myName;
        statusEl.className = 'status connected';
        roomTag.textContent = roomName || roomId;
        roomTag.style.display = 'inline';
        connectBtn.style.display = 'none';
        disconnectBtn.style.display = 'inline';
        msgInput.disabled = false;
        sendBtn.disabled = false;
        stopBtn.disabled = false;
      };

      ws.onmessage = function(event) {
        var msg = JSON.parse(event.data);
        if (msg.type === 'registered') {
          ws.send(JSON.stringify({ type: 'join_room', roomId: roomId }));
          return;
        }
        if (msg.type === 'room_joined') {
          addMessage('Joined ' + (roomName || roomId), '', 'system');
          fetch('/api/chat/rooms/' + roomId + '/messages', {
            headers: { 'Authorization': 'Bearer ' + apiKey }
          }).then(function(r) { return r.json(); }).then(function(msgs) {
            if (msgs && msgs.length) {
              msgs.forEach(function(m) { addMessage(m.text, m.fromName, 'message', m.createdAt); });
            }
          });
          return;
        }
        if (msg.type === 'message') { addMessage(msg.text, msg.from, 'message', msg.timestamp); return; }
        if (msg.type === 'participant_joined') { addMessage(msg.name + ' joined', '', 'system'); return; }
        if (msg.type === 'participant_left') { addMessage(msg.name + ' left', '', 'system'); return; }
      };

      ws.onclose = function() {
        statusEl.textContent = 'Disconnected';
        statusEl.className = 'status';
        roomTag.style.display = 'none';
        connectBtn.style.display = 'inline';
        disconnectBtn.style.display = 'none';
        msgInput.disabled = true;
        sendBtn.disabled = true;
        stopBtn.disabled = true;
      };
    }

    connectBtn.onclick = doConnect;
    disconnectBtn.onclick = function() { clearSession(); if (ws) ws.close(); };

    function sendMessage(text) {
      if (!ws || !roomId || !text) return;
      ws.send(JSON.stringify({ type: 'message', roomId: roomId, text: text }));
      addMessage(text, myName, 'message');
    }

    sendBtn.onclick = function() {
      var text = msgInput.value.trim();
      if (text) { sendMessage(text); msgInput.value = ''; }
    };

    msgInput.onkeydown = function(e) { if (e.key === 'Enter') sendBtn.onclick(); };

    stopBtn.onclick = function() {
      sendMessage('STOP');
      addMessage('STOP command sent', '', 'system');
    };

    // Auto-restore session on page load
    loadRooms();
    var session = loadSession();
    if (session) {
      document.getElementById('api-key-input').value = session.apiKey || 'dev-api-key-change-me';
      document.getElementById('name-input').value = session.myName || 'human';
      setTimeout(function() {
        roomSelect.value = session.roomId;
        if (roomSelect.value === session.roomId) {
          doConnect();
        }
      }, 500);
    }
  </script>
  <review-panel api-url="http://localhost:3210/api"></review-panel>
</body>
</html>
