services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: claude_chat
      POSTGRES_PASSWORD: claude_chat
      POSTGRES_DB: claude_chat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "claude_chat"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
